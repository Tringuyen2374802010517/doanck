<!DOCTYPE html>
<html>
<head>
    <title>Pill AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Pill Identification</h1>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <button>Predict</button>
    </form>

    {% if result %}
        <div class="result">
            {{ result }}
        </div>
    {% endif %}
</div>

</body>
</html>
